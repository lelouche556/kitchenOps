x-app-build: &app_build
  build:
    context: .
    dockerfile: Dockerfile
  image: swishassignment-app:local

services:

  postgres:
    image: postgres:16
    container_name: kangaroo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kangaroo_paw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
      - ./docker/postgres/init/01-create-temporal-dbs.sql:/docker-entrypoint-initdb.d/01-create-temporal-dbs.sql:ro
      - ./docker/postgres/init/02-seed-kitchen.sql:/docker-entrypoint-initdb.d/02-seed-kitchen.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kangaroo_paw"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7
    container_name: kangaroo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: kangaroo-kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: kangaroo-kafka-console
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_started
    ports:
      - "8081:8080"

  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: kangaroo-temporal
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:latest
    container_name: kangaroo-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    ports:
      - "8088:8080"

  api:
    <<: *app_build
    container_name: kangaroo-api
    command: ["api"]
    environment:
      HTTP_ADDR: :8080
      PG_DSN: host=postgres port=5432 user=postgres password=postgres dbname=kangaroo_paw sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      REDIS_PENDING_KEY: tasks:pending
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: kitchen.domain.events
      KAFKA_GROUP_ID: kitchen-api-publisher
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8080:8080"

  topic-consumer:
    image: swishassignment-app:local
    container_name: kangaroo-topic-consumer
    command: ["topic-consumer"]
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: kitchen.domain.events
      KAFKA_GROUP_ID: kitchen-topic-consumer
      KAFKA_PARTITION: -1
      KAFKA_FROM_BEGINNING: "false"
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      kafka:
        condition: service_started
      temporal:
        condition: service_started

  temporal-worker:
    image: swishassignment-app:local
    container_name: kangaroo-temporal-worker
    command: ["temporal-worker"]
    environment:
      PG_DSN: host=postgres port=5432 user=postgres password=postgres dbname=kangaroo_paw sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      REDIS_PENDING_KEY: tasks:pending
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started

  kafka-tail:
    image: swishassignment-app:local
    container_name: kangaroo-kafka-tail
    command: ["kafka-tail"]
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: kitchen.domain.events
      KAFKA_FROM_BEGINNING: "true"
    depends_on:
      kafka:
        condition: service_started
    profiles: ["debug"]

volumes:
  postgres_data:
